name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR (or main) supersedes in-flight runs for the same ref;
# cancel the stale ones to free runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      # Report every OS result; don't cancel the matrix on the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-go@v7
        with:
          go-version-file: helm-engine/go.mod
          cache-dependency-path: helm-engine/go.sum
      - name: Cache Electron binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      # build first: @kubus/shared (and /server for electron) resolve types
      # from their dist/, which doesn't exist on a fresh checkout
      - run: pnpm build
      - run: pnpm build:helm-engine
      - run: pnpm test
      # Type-aware linting also resolves workspace package declarations.
      - run: pnpm lint
      - run: pnpm typecheck
      # Unpacked desktop build so a broken electron-builder config fails PRs.
      # No platform flag: each runner packages for its own OS.
      - run: pnpm --filter @kubus/electron exec electron-builder --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      # Boot the app's server on each OS to catch runtime startup regressions
      # (won't listen, missing static assets, crash-on-boot) that packaging
      # alone misses. Headless, so it needs no display on any runner.
      - run: pnpm smoke

  # Full-stack Playwright suite: built client + real server + a kind cluster
  # seeded with the fixtures in tests/e2e/fixtures.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kubus/shared --filter @kubus/server --filter @kubus/client build
      # Cluster name kubus-a matches the local dev clusters, so the suite
      # runs unchanged in both places (context kind-kubus-a).
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kubus-a
      # The suite drives the system Chrome that ships on ubuntu runners.
      - run: pnpm test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            tests/playwright-report
            tests/e2e/.results
          retention-days: 7
